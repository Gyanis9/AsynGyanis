name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 8 * * 1' # 每周一 UTC 08:00

jobs:
  analyze:
    name: Analyze (C++)
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    permissions:
      security-events: write
      actions: read
      contents: read

    strategy:
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ninja-build python3-venv python3-pip

      - name: Setup Conan
        run: |
          python3 -m venv .venv
          .venv/bin/pip install conan
          .venv/bin/conan profile detect --force

      - name: Cache Conan packages
        uses: actions/cache@v4
        with:
          path: ~/.conan2/p
          key: conan-codeql-${{ hashFiles('conandata.yml') }}
          restore-keys: conan-codeql-

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: cpp
          queries: security-extended,security-and-quality

      - name: Configure
        run: cmake --preset release

      - name: Build
        run: cmake --build build/release -j$(nproc)

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:cpp
