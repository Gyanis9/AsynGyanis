name: Bug 报告
description: 提交缺陷报告
labels: [bug]
body:
  - type: textarea
    attributes:
      label: 描述
      description: 清晰描述你遇到的问题
    validations:
      required: true

  - type: textarea
    attributes:
      label: 复现步骤
      description: 提供最小复现步骤
      placeholder: |
        1. 编译命令 '...'
        2. 运行命令 '...'
        3. 观察到的错误 '...'
    validations:
      required: true

  - type: textarea
    attributes:
      label: 预期行为
      description: 你期望发生什么
    validations:
      required: true

  - type: textarea
    attributes:
      label: 实际行为
      description: 实际发生了什么（错误信息、堆栈回溯等）

  - type: dropdown
    attributes:
      label: 构建模式
      options:
        - Debug (ASan+UBSan)
        - Release (LTO)
        - 两者均出现
    validations:
      required: true

  - type: input
    attributes:
      label: 编译器版本
      placeholder: g++ (GCC) 13.2.0

  - type: input
    attributes:
      label: 操作系统
      placeholder: Ubuntu 24.04 / WSL2

  - type: textarea
    attributes:
      label: 附加信息
      description: CMakePresets、conandata.yml、相关日志等
